<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a1628"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="application-name" content="Shiro's Task Garden"/>
<meta name="description" content="A beautiful task manager with Shiro the cat"/>
<link rel="icon" type="image/png" sizes="192x192" href="shiro-icon.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="shiro-icon.png"/>
<link rel="apple-touch-icon" href="shiro-icon.png"/>
<link rel="manifest" href="manifest.json"/>
<title>Shiro's Task Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --night: #060e1f;
    --deep-blue: #0a1628;
    --mid-blue: #0d2044;
    --accent-blue: #1a3a6b;
    --lantern-gold: #f4c842;
    --lantern-warm: #e8923a;
    --cherry: #f4a0b5;
    --cherry-deep: #c96b8a;
    --star-white: #e8eeff;
    --fuji-purple: #4a3066;
    --text-main: #d8e4ff;
    --text-dim: #7a99cc;
    --task-bg: rgba(10,22,50,0.85);
    --task-border: rgba(100,160,255,0.2);
    --radius: 16px;
    --font-serif: 'Noto Serif JP', serif;
    --font-sans: 'Zen Kaku Gothic New', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--night);
    font-family: var(--font-sans);
    color: var(--text-main);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* SCREENS */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
    overflow: hidden;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* STARRY BACKGROUND */
  .stars-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* MT FUJI BACKGROUND */
  .scene-bg {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  /* DASHBOARD */
  #screen-dashboard {
    z-index: 10;
  }

  .dashboard-card {
    position: relative; z-index: 2;
    background: rgba(10,22,50,0.75);
    border: 1px solid rgba(100,160,255,0.25);
    border-radius: 24px;
    padding: 32px 28px 28px;
    width: 88vw; max-width: 360px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .dashboard-title {
    font-family: var(--font-serif);
    font-size: 13px; font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--lantern-gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .dashboard-sub {
    font-size: 10px; letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .shiro-container {
    width: 160px; height: 160px;
    margin: 0 auto 20px;
    position: relative;
  }

  .speech-bubble {
    position: relative;
    background: rgba(20,40,90,0.9);
    border: 1px solid rgba(100,160,255,0.3);
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 13px; line-height: 1.6;
    color: var(--text-main);
    margin-bottom: 20px;
  }
  .speech-bubble::after {
    content: '';
    position: absolute; top: -8px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid rgba(20,40,90,0.9);
  }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(100,160,255,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
    text-align: center;
  }
  .name-input::placeholder { color: var(--text-dim); }
  .name-input:focus { border-color: rgba(100,160,255,0.7); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #1a3a6b, #2a5aab);
    border: 1px solid rgba(100,160,255,0.4);
    border-radius: 12px;
    padding: 13px;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 700;
    color: var(--star-white);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-primary:active { transform: scale(0.97); }

  .user-profile-btn {
    width: 100%;
    background: rgba(244,200,66,0.1);
    border: 1px solid rgba(244,200,66,0.4);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .user-profile-btn:active { transform: scale(0.97); }
  .user-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent-blue), var(--fuji-purple));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .user-info { flex: 1; }
  .user-name { font-size: 14px; font-weight: 700; color: var(--lantern-gold); }
  .user-hint { font-size: 11px; color: var(--text-dim); }

  /* MAIN APP */
  #screen-main {
    z-index: 10;
    flex-direction: column;
    justify-content: flex-start;
    padding: 0;
  }

  .top-bar {
    position: relative; z-index: 5;
    width: 100%;
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    padding-top: max(env(safe-area-inset-top), 12px);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(6,14,31,0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(100,160,255,0.1);
  }

  .top-title {
    font-family: var(--font-serif);
    font-size: 16px; font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--lantern-gold);
  }

  .btn-logout {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(100,160,255,0.2);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:active { opacity: 0.7; }

  .main-content {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 14px 200px;
    position: relative; z-index: 3;
  }

  /* SHIRO on main - smaller floating */
  .shiro-main-wrap {
    position: absolute;
    bottom: 80px; right: 0px;
    z-index: 10;
    pointer-events: none;
    width: 110px; height: 110px;
  }

  /* TASK BOARD */
  .board-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .board-label {
    font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 300;
  }

  .task-count {
    font-size: 11px;
    color: var(--cherry);
    background: rgba(201,107,138,0.15);
    padding: 2px 8px; border-radius: 20px;
  }

  /* ADD TASK */
  .add-task-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 12px 14px;
    padding-bottom: max(env(safe-area-inset-bottom), 16px);
    background: rgba(6,14,31,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(100,160,255,0.12);
    display: flex; gap: 8px; align-items: center;
  }

  .add-task-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(100,160,255,0.25);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text-main);
    outline: none;
  }
  .add-task-input::placeholder { color: var(--text-dim); font-size: 13px; }
  .add-task-input:focus { border-color: rgba(100,160,255,0.5); }

  .btn-add {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #1a3a6b, #c96b8a);
    border: none;
    border-radius: 14px;
    font-size: 22px;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .btn-add:active { transform: scale(0.92); }

  /* TASK CARDS */
  .task-card {
    background: var(--task-bg);
    border: 1px solid var(--task-border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: taskIn 0.35s ease;
  }
  @keyframes taskIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.96); }
    to { opacity: 1; transform: none; }
  }

  .task-card.completed {
    border-color: rgba(244,200,66,0.2);
    background: rgba(10,22,50,0.5);
  }
  .task-card.completed .task-title {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .task-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(to bottom, var(--cherry), var(--cherry-deep));
    border-radius: 3px 0 0 3px;
    opacity: 0.7;
  }
  .task-card.completed::before {
    background: linear-gradient(to bottom, var(--lantern-gold), var(--lantern-warm));
  }

  .task-top {
    display: flex; align-items: flex-start; gap: 10px;
  }

  .task-checkbox {
    width: 22px; height: 22px;
    border: 2px solid rgba(100,160,255,0.4);
    border-radius: 6px;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    background: transparent;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .task-checkbox.checked {
    background: var(--lantern-gold);
    border-color: var(--lantern-gold);
  }
  .task-checkbox.checked::after {
    content: '✓';
    color: var(--night);
    font-size: 13px;
    font-weight: 900;
    line-height: 1;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 14px; line-height: 1.4;
    color: var(--text-main);
    word-break: break-word;
    transition: all 0.3s;
  }

  .task-alarm {
    display: flex; align-items: center; gap: 4px;
    margin-top: 4px;
    font-size: 11px; color: var(--lantern-gold);
  }

  .task-note {
    font-size: 12px; color: var(--text-dim);
    margin-top: 6px; line-height: 1.4;
    font-style: italic;
    word-break: break-word;
  }

  .task-actions {
    display: flex; gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .btn-task {
    font-family: var(--font-sans);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-task:active { transform: scale(0.93); }

  .btn-note {
    background: rgba(100,160,255,0.08);
    border-color: rgba(100,160,255,0.25);
    color: var(--text-dim);
  }
  .btn-alarm {
    background: rgba(244,200,66,0.08);
    border-color: rgba(244,200,66,0.25);
    color: var(--lantern-gold);
  }
  .btn-delete {
    background: rgba(201,107,138,0.08);
    border-color: rgba(201,107,138,0.25);
    color: var(--cherry);
    margin-left: auto;
  }

  /* NOTE INPUT inline */
  .note-input-wrap { margin-top: 8px; display: flex; gap: 6px; }
  .note-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(100,160,255,0.2);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--text-main);
    outline: none;
    resize: none;
    line-height: 1.4;
  }
  .btn-save-note {
    background: rgba(100,160,255,0.15);
    border: 1px solid rgba(100,160,255,0.3);
    border-radius: 8px;
    color: var(--text-main);
    font-size: 12px;
    padding: 0 10px;
    cursor: pointer;
    font-family: var(--font-sans);
    white-space: nowrap;
  }

  /* ALARM PICKER */
  .alarm-input-wrap { margin-top: 8px; display: flex; gap: 6px; }
  .alarm-time-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(244,200,66,0.25);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--text-main);
    outline: none;
    color-scheme: dark;
  }
  .btn-set-alarm {
    background: rgba(244,200,66,0.15);
    border: 1px solid rgba(244,200,66,0.3);
    border-radius: 8px;
    color: var(--lantern-gold);
    font-size: 12px;
    padding: 0 10px;
    cursor: pointer;
    font-family: var(--font-sans);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px; line-height: 1.6;
  }

  /* SECTION HEADER */
  .section-label {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim);
    margin: 16px 0 8px;
    padding-left: 4px;
    font-weight: 300;
  }

  /* PETAL CANVAS */
  #petal-canvas {
    position: fixed; inset: 0;
    z-index: 15;
    pointer-events: none;
  }

  /* LANTERNS */
  .lanterns-layer {
    position: fixed; inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* TOAST */
  .toast {
    position: fixed;
    top: 80px; left: 50%; transform: translateX(-50%);
    z-index: 50;
    background: rgba(10,22,50,0.95);
    border: 1px solid rgba(100,160,255,0.3);
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-main);
    backdrop-filter: blur(20px);
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ALARM NOTIFICATION */
  .alarm-popup {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .alarm-popup.show { opacity: 1; pointer-events: all; }
  .alarm-card {
    background: rgba(10,22,50,0.95);
    border: 1px solid rgba(244,200,66,0.5);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    width: 80vw; max-width: 300px;
    box-shadow: 0 0 40px rgba(244,200,66,0.2);
  }
  .alarm-icon { font-size: 32px; margin-bottom: 10px; }
  .alarm-title { font-family: var(--font-serif); font-size: 17px; color: var(--lantern-gold); margin-bottom: 8px; }
  .alarm-task { font-size: 14px; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; }
  .btn-dismiss {
    background: linear-gradient(135deg, rgba(244,200,66,0.2), rgba(232,146,58,0.2));
    border: 1px solid rgba(244,200,66,0.4);
    border-radius: 12px;
    padding: 11px 24px;
    color: var(--lantern-gold);
    font-family: var(--font-sans);
    font-size: 14px;
    cursor: pointer;
  }

  /* SHIRO SPEECH BUBBLE (floating near cat on main screen) */
  .shiro-speech {
    position: fixed;
    bottom: 195px; right: 10px;
    z-index: 11;
    max-width: 180px;
    background: rgba(10,22,50,0.92);
    border: 1px solid rgba(100,160,255,0.35);
    border-radius: 12px 12px 4px 12px;
    padding: 8px 12px;
    font-size: 12px; line-height: 1.5;
    color: var(--text-main);
    backdrop-filter: blur(16px);
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .shiro-speech.show {
    opacity: 1; transform: translateY(0);
  }
  /* Dashboard variant */
  .shiro-speech-dash {
    position: absolute;
    bottom: -10px; left: 50%; transform: translateX(-50%) translateY(100%);
    width: 200px;
    background: rgba(10,22,50,0.92);
    border: 1px solid rgba(244,200,66,0.3);
    border-radius: 12px;
    padding: 9px 13px;
    font-size: 12px; line-height: 1.55;
    color: var(--text-main);
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s;
    z-index: 5;
  }
  .shiro-speech-dash.show { opacity: 1; }

  /* CAT KISS slow blink keyframe */
  @keyframes catKiss {
    0%   { ry: 9; }
    30%  { ry: 4; }
    50%  { ry: 1; }
    70%  { ry: 4; }
    100% { ry: 9; }
  }
  @keyframes catKissLeft {
    0%   { d: path("M57,70 Q65,62 73,70"); opacity: 0; }
    30%  { d: path("M57,70 Q65,66 73,70"); opacity: 0; }
    50%  { d: path("M57,70 Q65,70 73,70"); opacity: 1; }
    70%  { d: path("M57,70 Q65,66 73,70"); opacity: 0.5; }
    100% { d: path("M57,70 Q65,62 73,70"); opacity: 0; }
  }
  .main-content::-webkit-scrollbar { width: 3px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: rgba(100,160,255,0.2); border-radius: 3px; }

  /* SCRATCH ANIMATIONS */
  @keyframes scratchLine {
    0%   { stroke-dashoffset: 100; opacity: 1; }
    55%  { stroke-dashoffset: 0;   opacity: 1; }
    100% { stroke-dashoffset: 0;   opacity: 0; }
  }
  @keyframes scratchFade {
    0%   { opacity: 0; }
    8%   { opacity: 1; }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- STARS -->
<canvas class="stars-canvas" id="stars"></canvas>

<!-- PETAL CANVAS -->
<canvas id="petal-canvas"></canvas>

<!-- SVG PAW + SCRATCH OVERLAY -->
<svg id="action-svg" style="position:fixed;inset:0;width:100%;height:100%;z-index:16;pointer-events:none;overflow:visible;">
  <defs>
    <filter id="pawglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scratchglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- PAW drawn on petal canvas via JS -->

  <!-- SCRATCH MARKS group — JS sets transform -->
  <g id="svg-scratch" style="display:none;" filter="url(#scratchglow)">
    <line id="sc1" x1="-30" y1="-44" x2="10"  y2="44"
          stroke="#ff5577" stroke-width="4" stroke-linecap="round"
          stroke-dasharray="100" stroke-dashoffset="100"/>
    <line id="sc2" x1="-8"  y1="-48" x2="32"  y2="40"
          stroke="#ff3360" stroke-width="3.2" stroke-linecap="round"
          stroke-dasharray="100" stroke-dashoffset="100"/>
    <line id="sc3" x1="14"  y1="-46" x2="54"  y2="36"
          stroke="#ff6688" stroke-width="2.8" stroke-linecap="round"
          stroke-dasharray="100" stroke-dashoffset="100"/>
    <!-- Spark dots at tops of scratches -->
    <circle cx="-30" cy="-44" r="3.5" fill="#ff99aa" opacity="0.9"/>
    <circle cx="-8"  cy="-48" r="3"   fill="#ff7799" opacity="0.85"/>
    <circle cx="14"  cy="-46" r="3.5" fill="#ff99aa" opacity="0.9"/>
    <!-- 💢 symbol offset right -->
    <text x="44" y="-34" font-size="22" text-anchor="middle">💢</text>
  </g>
</svg>

<!-- SCENE BACKGROUND — viewBox matches phone screen, trees placed in visible lower 40% -->
<svg class="scene-bg" viewBox="0 0 412 915" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03080f"/>
      <stop offset="35%" stop-color="#060e1f"/>
      <stop offset="70%" stop-color="#0d1f3a"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="fujiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce8f8"/>
      <stop offset="25%" stop-color="#9aaece"/>
      <stop offset="70%" stop-color="#4a6090"/>

// =====================
// STARS ANIMATION
// =====================
const starsCanvas = document.getElementById('stars');
const sCtx = starsCanvas.getContext('2d');
let stars = [];

function initStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  stars = [];
  // Dense small stars across upper 75% of sky
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * starsCanvas.width,
      y: Math.random() * starsCanvas.height * 0.75,
      r: Math.random() * 1.1 + 0.2,
      a: Math.random(),
      da: (Math.random() * 0.006 + 0.002) * (Math.random() > 0.5 ? 1 : -1),
      big: false
    });
  }
  // Medium bright stars scattered everywhere
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * starsCanvas.width,
      y: Math.random() * starsCanvas.height * 0.8,
      r: Math.random() * 1.8 + 0.8,
      a: Math.random() * 0.5 + 0.5,
      da: (Math.random() * 0.01 + 0.003) * (Math.random() > 0.5 ? 1 : -1),
      big: false
    });
  }
  // Large accent stars with cross-glint
  for (let i = 0; i < 18; i++) {
    stars.push({
      x: Math.random() * starsCanvas.width,
      y: Math.random() * starsCanvas.height * 0.6,
      r: Math.random() * 2.2 + 1.5,
      a: Math.random() * 0.4 + 0.6,
      da: (Math.random() * 0.012 + 0.004) * (Math.random() > 0.5 ? 1 : -1),
      big: true
    });
  }
}

function drawStars() {
  sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  stars.forEach(s => {
    s.a += s.da;
    if (s.a > 1 || s.a < 0.1) s.da = -s.da;
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(220,235,255,${s.a})`;
    sCtx.fill();
    if (s.big) {
      sCtx.save();
      sCtx.globalAlpha = s.a * 0.55;
      sCtx.strokeStyle = `rgba(230,240,255,${s.a})`;
      sCtx.lineWidth = 0.6;
      const gl = s.r * 3.5;
      sCtx.beginPath(); sCtx.moveTo(s.x - gl, s.y); sCtx.lineTo(s.x + gl, s.y); sCtx.stroke();
      sCtx.beginPath(); sCtx.moveTo(s.x, s.y - gl); sCtx.lineTo(s.x, s.y + gl); sCtx.stroke();
      sCtx.restore();
    }
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', initStars);
initStars();
drawStars();

// =====================
// PETAL SYSTEM
// =====================
const petalCanvas = document.getElementById('petal-canvas');
const pCtx = petalCanvas.getContext('2d');
let petals = [];

function resizePetal() {
  petalCanvas.width = window.innerWidth;
  petalCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizePetal);

function spawnPetals(type) {
  // type: 'swirl' | 'scatter' | 'float' | 'drift'
  const colors = ['#f4a0b5','#c96b8a','#f7c5d5','#e8809a','#ffd0e0'];
  const count = type === 'scatter' ? 22 : 16;

  for (let i = 0; i < count; i++) {
    const cx = window.innerWidth * 0.5 + (Math.random() - 0.5) * 120;
    const cy = window.innerHeight * 0.6 + (Math.random() - 0.5) * 80;
    let vx, vy;

    if (type === 'swirl') {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * 1.5 + 0.5;
      vx = Math.cos(angle) * spd;
      vy = Math.sin(angle) * spd - 1.5;
    } else if (type === 'scatter') {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * 3 + 2;
      vx = Math.cos(angle) * spd;
      vy = Math.sin(angle) * spd;
    } else if (type === 'float') {
      vx = (Math.random() - 0.5) * 1.5;
      vy = -(Math.random() * 2 + 1);
    } else { // drift
      vx = (Math.random() - 0.5) * 0.8;
      vy = Math.random() * 0.8 + 0.3;
    }

    petals.push({
      x: cx + (Math.random() - 0.5) * 200,
      y: type === 'swirl' ? window.innerWidth * 0.5 : cy,
      vx, vy,
      r: Math.random() * 5 + 3,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.08,
      alpha: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 0,
      maxLife: 60 + Math.floor(Math.random() * 40),

let pawAnim = null; // must be declared BEFORE drawPetals is called

function showPawStamp() {
  const x = window.innerWidth  * 0.45;
  const y = window.innerHeight * 0.40;
  pawAnim = { x, y, life: 0, maxLife: 70 };
}

function drawPaw(ctx, cx, cy, scale, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // Outer glow
  const grd = ctx.createRadialGradient(0, 6, 2, 0, 6, 48);
  grd.addColorStop(0,   'rgba(255,180,210,0.35)');
  grd.addColorStop(1,   'rgba(255,180,210,0)');
  ctx.beginPath();
  ctx.ellipse(0, 6, 48, 40, 0, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Main pad outer
  ctx.beginPath();
  ctx.ellipse(0, 10, 28, 22, 0, 0, Math.PI*2);
  ctx.fillStyle = '#ffd0e4';
  ctx.fill();

  // Main pad inner
  ctx.beginPath();
  ctx.ellipse(0, 10, 19, 15, 0, 0, Math.PI*2);
  ctx.fillStyle = '#ffb8cc';
  ctx.fill();

  // Deep inner pad
  ctx.beginPath();
  ctx.ellipse(0, 11, 11, 9, 0, 0, Math.PI*2);
  ctx.fillStyle = '#f99ab5';
  ctx.fill();

  // 4 toe beans
  const toes = [[-19,-13],[-6,-20],[7,-20],[20,-13]];
  toes.forEach(([tx,ty]) => {
    ctx.beginPath();
    ctx.ellipse(tx, ty, 9, 8, 0, 0, Math.PI*2);
    ctx.fillStyle = '#ffd0e4';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(tx, ty, 6, 5.5, 0, 0, Math.PI*2);
    ctx.fillStyle = '#f9a0b8';
    ctx.fill();
  });

  // Sparkle and petal accents
  ctx.globalAlpha = alpha * 0.85;
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#f4c842';
  ctx.fillText('✦', 28, -14);
  ctx.font = '20px sans-serif';
  ctx.fillText('🌸', -44, -10);

  ctx.restore();
}

function drawPetals() {
  pCtx.clearRect(0, 0, petalCanvas.width, petalCanvas.height);

  // --- PAW STAMP ---
  if (pawAnim) {
    pawAnim.life++;
    const t = pawAnim.life / pawAnim.maxLife;
    let scale, alpha;
    if (t < 0.25) {
      // bounce in
      scale = t / 0.25 * 1.25;
      alpha = t / 0.25;
    } else if (t < 0.55) {
      // settle
      scale = 1.25 - (t - 0.25) / 0.30 * 0.28;
      alpha = 1;
    } else {
      // fade out
      scale = 0.97 + (t - 0.55) / 0.45 * 0.08;
      alpha = 1 - (t - 0.55) / 0.45;
    }
    drawPaw(pCtx, pawAnim.x, pawAnim.y, scale, Math.max(0, alpha));
    if (pawAnim.life >= pawAnim.maxLife) pawAnim = null;
  }

  // --- PETALS ---
  petals = petals.filter(p => p.life < p.maxLife);

  petals.forEach(p => {
    p.life++;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.rotV;
    p.alpha = 1 - (p.life / p.maxLife);

    if (p.type === 'swirl') {
      p.vx += Math.sin(p.life * 0.1) * 0.05;
    } else if (p.type === 'scatter') {
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.vy += 0.05; // gravity
    } else if (p.type === 'float') {
      p.vx += Math.sin(p.life * 0.08) * 0.03;
    } else {
      p.vx += Math.sin(p.life * 0.06) * 0.02;
    }

    pCtx.save();
    pCtx.translate(p.x, p.y);
    pCtx.rotate(p.rot);
    pCtx.globalAlpha = p.alpha;
    // Petal shape (5-point)
    pCtx.beginPath();
    pCtx.ellipse(0, -p.r/2, p.r * 0.6, p.r, 0, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();
    pCtx.restore();
  });

  requestAnimationFrame(drawPetals);
}
drawPetals();

let scratchTimeout = null;
function showScratchMarks() {
  const sc = document.getElementById('svg-scratch');
  const sc1 = document.getElementById('sc1');
  const sc2 = document.getElementById('sc2');
  const sc3 = document.getElementById('sc3');
  if (!sc) return;
  const x = window.innerWidth * 0.42;
  const y = window.innerHeight * 0.40;
  sc.setAttribute('transform', `translate(${x}, ${y})`);
  sc.style.display = 'block';

  // Reset and trigger line draw animations
  [sc1, sc2, sc3].forEach((el, i) => {
    if (!el) return;
    el.style.animation = 'none';
    el.setAttribute('stroke-dashoffset', '100');
    void el.getBoundingClientRect();
    el.style.animation = `scratchLine 0.5s ease ${i * 0.09}s forwards`;
  });

  sc.style.animation = 'none';
  void sc.getBoundingClientRect();
  sc.style.animation = 'scratchFade 1.4s ease forwards';
  clearTimeout(scratchTimeout);
  scratchTimeout = setTimeout(() => {
    sc.style.display = 'none';
    sc.style.animation = 'none';
  }, 1450);
}

let idleInterval = null;
let kissAnimFrame = null;

function catKiss(screen) {
  if (currentEmotion !== 'idle') return;
  const lidL = document.getElementById(`lid-left-${screen}`);
  const lidR = document.getElementById(`lid-right-${screen}`);
  if (!lidL || !lidR) return;

  // Determine if it's a purr or cat kiss (alternate)
  const doCatKiss = Math.random() > 0.3; // 70% cat kiss, 30% just purr

  if (doCatKiss) {
    showShiroSpeech('catkiss', screen);
    // Slowly close eyes over 800ms, hold 400ms, reopen over 800ms
    const totalFrames = 80;
    let frame = 0;
    const maxH = 8; // eyelid height at full close

    function animKiss() {
      if (currentEmotion !== 'idle') {
        lidL.setAttribute('height', '0');
        lidR.setAttribute('height', '0');
        return;
      }
      frame++;
      let h;
      if (frame <= 30) {
        // closing
        h = (frame / 30) * maxH;
      } else if (frame <= 50) {
        // held closed
        h = maxH;
      } else if (frame <= 80) {
        // reopening
        h = ((80 - frame) / 30) * maxH;
      } else {
        h = 0;
        lidL.setAttribute('height', '0');
        lidR.setAttribute('height', '0');
        return;
      }
      lidL.setAttribute('height', String(Math.round(h)));
      lidR.setAttribute('height', String(Math.round(h)));
      kissAnimFrame = requestAnimationFrame(animKiss);
    }
    kissAnimFrame = requestAnimationFrame(animKiss);
  } else {
    // Just a quick blink + purr
    showShiroSpeech('idle_purr', screen);
    const bl = document.getElementById(`blink-${screen}`);
    if (bl) {
      bl.style.display = 'block';
      setTimeout(() => { if (bl) bl.style.display = 'none'; }, 130);
    }
  }

function addTask() {

    id: Date.now(),
    title,

  task.completed = !task.completed;

    setEmotion('happy', 'main');

function deleteTask(id) {
  const task = tasks.find(t => t.id === id);

    showScratchMarks();

    setEmotion('angry', 'main');
    spawnPetals('scatter');

function setAlarm(id) {
  const input = document.getElementById(`alarm-input-${id}`);
  const task = tasks.find(t => t.id === id);
  if (!task || !input || !input.value) return;

  const alarmTime = new Date(input.value).getTime();
  const now = Date.now();
  if (alarmTime <= now) { showToast('Please pick a future time!'); return; }

  clearAlarm(id);
  task.alarm = alarmTime;
  saveState();

  const delay = alarmTime - now;
  alarmTimers[id] = setTimeout(() => fireAlarm(id), delay);

  renderTasks();
  showToast('Reminder set! 🔔');
}

function clearAlarm(id) {
  if (alarmTimers[id]) { clearTimeout(alarmTimers[id]); delete alarmTimers[id]; }
  const task = tasks.find(t => t.id === id);
  if (task) task.alarm = null;
}

function restoreAlarms() {
  const now = Date.now();
  tasks.forEach(task => {
    if (task.alarm) {
      const delay = task.alarm - now;
      if (delay > 0) {
        alarmTimers[task.id] = setTimeout(() => fireAlarm(task.id), delay);
      } else {
        task.alarm = null;
      }
    }
  });
}

function clearAllAlarms() {
  Object.values(alarmTimers).forEach(t => clearTimeout(t));

  document.getElementById('alarm-popup-task').textContent = task.title;
  document.getElementById('alarm-popup').classList.add('show');
  setEmotion('curious', 'main');
  spawnPetals('float');
  task.alarm = null;
  delete alarmTimers[id];

}
